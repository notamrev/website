name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 18:00 UTC Sunday = 11:30 PM IST Sunday — rebuilds/republishes weekly
    # even with no code changes, so new Notion/GitHub content goes live
    # without needing a manual push.
    - cron: "0 18 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - run: npm ci
      - run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TRIPS_DATABASE_ID: ${{ secrets.NOTION_TRIPS_DATABASE_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
